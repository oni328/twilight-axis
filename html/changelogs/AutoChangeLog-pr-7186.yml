author: "radarseas"
delete-after: True
changes:
  - rscadd: "Added two new shields for lich skeles, these can be crafted too."
  - rscadd: "Added a new explosion for sapper skeles"
  - rscadd: "Decrepit Togas for those whom are too ancient to remember their war without reason, in her name."
  - rscadd: "Added ancient versions of the tongs + hammer"
  - rscadd: "Added a few new peices of lich skele clothing"
  - rscadd: "Lich skeles can now pick features like unbound spellblades."
  - balance: "death knight's statline has been adjusted, making them a powerful, but slow and unsprinting juggernaut with unbound strength, crack them down at distance or overwhelm them with numbers."
  - balance: "ancient siegebow no longer has less durability than the basic one, in addition lich ballistaries now get it for flavor."
  - balance: "death knight's light gambeson has been swapped with a heavy one to make them slightly tankier, aim for the head. Double-tap."
  - balance: "spellblade lich skele has better stats so they don't instantly keel over to fire unlike wretch skeles."
  - balance: "skeletons are now shatter weak! rib fractures and paralyising stage-two neck/skullcracks can kill them now!"
  - balance: "lich sappers are now lightly armored, semi-smith, proper laborers that double as seige bombs with a longer windup to obliterate walls and heavily hurt anyone nearby."
  - balance: "legionnaires now get to pick a sidearm instead of always having javs, between a net/javs/knife or decrepid pellets and a sling"
  - balance: "bulwarks get to pick disiplines instead of just weaponry, your choice now adjusts your statline to have a playstyle around your weapon pick."
  - balance: "lich's self-detonation has been buffed immensely, its now extremely lethal to anyone nearby if they manage to survive long enough to set it off."
  - balance: "skeletons can no longer make miester accounts and are now given trait_outlaw so they're truely recognised as a rightless abominations they are under Astrata's light."
  - balance: "ballistiares no longer randomly have a 30% chance of a seigebow and instead have a proper ancient crossbow."
  - bugfix: "fixed siege skeles getting lich guardhood"
  - bugfix: "fixed lich guard hood having keep colors"
  - bugfix: "fixed lich robes having no female render"
  - image: "added two new shields - Ancient Hoplon and Greatshield"
  - code_imp: "reworked most of lich skeles."