author: "radarseas"
delete-after: True
changes:
  - rscdel: "Bloodpool Vampires no longer use Mercenary and Wretch Licker Job classes, they now have their own classes."
  - balance: "Vampire servants no longer show their Job on examination nor show up on the actor's list and instead appear as wanderers."
  - rscadd: "new UI made by Patapolla, its absolutely gorgious and should make vlord a lot more polished on the UI side for clans/bloodpool use."
  - balance: "Bloodpool created Vampires from Vlord now dust on death."
  - balance: "Vampire clans have been redone slightly, there's far more distinction between different clans than just potencies now from traits per-Vampire to some getting extra traits for their lords."
  - rscadd: "Vlord gets another confession line."
  - balance: "Thronleer no longer gets mist form, given to Children of Darkness"
  - code_imp: "3 new files for subclasses for vampyre servants."
  - code_imp: "Roguetown.dm now has (3) additional job defines for the new vampyre subclasses"
  - balance: "Vampire servants are now Neonite generation, alongside guards giving them the ability to develop their powers and work towards deadlier potencies."
  - bugfix: "Vampire lord no longer gets excessively high weaponry skill from class overlap as intended."
  - bugfix: "Vampire lord's \"Ichor Fang\" weapon now faces the correct direction when your sprite is southward."
  - balance: "Vampire lord once again get legendary swords, they can get grab immunity/infinite stamina + shock immunity too once they work hard enough for it, they also get some riding skill to reduce map travel time if they steal a mount."
  - balance: "Vampire lord loadout has been changed, it now has a starting dagger, more bling and a secondary pouch of gold as well as slight skill adjustments."
  - balance: "Vampire lord leveling on the lower end now costs significantly less so you have more time to roleplay, while final tier full-power has gone up a little bit. Armor cost has been bumped up too to avoid mass-distribution of it."
  - balance: "Vampire Lord Sun Kill is GONE as a seperate rite. Its now tied to full power which is far, far. scarier. Cutting out more lights and having a different omen noise. Only Astratians can hear their godess scream."
  - qol: "Vampire lord bloodpool projects now describe their effects far more clearly."
  - qol: "Graggar + Vlord helmets correctly inform you that you have a new trait that lets you bite wearing a helm."
  - bugfix: "Vampire lord helmet has the correct armor values, whoops."
  - balance: "Vampire lord's armor set has been given HEAVY resistance to all kinds of damage including fire + acid, with the cavet of being completely un-enchantable at all and can only be summoned once."
  - qol: "most of vlord's structures have descriptions now, includes a bonus one for the CURRENTLY UNUSED, Vlord blood throne that isn't mapped in. This should help newer players figure out the gameplay loop."
  - balance: "non-vampires can no longer pick up the Ichor Fang, this should help vlord get disarmed much less. It also cannot be enchanted, mostly because it has 55 force wielded and also completely loses it on resummoning it."
  - balance: "early level potencies can be learned MUCH faster, scaling is tweaked a little for more higher level potencies."