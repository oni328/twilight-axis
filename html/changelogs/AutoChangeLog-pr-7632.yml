author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Madman Threat Point budget reduced from 50 points to 30 points, so that blockade with them are not underwhelming"
  - bugfix: "When you check a material off on the commissioner, it also excludes recipes with it as a SECONDARY input"
  - balance: "Rural Taxes reduced from 250 to 200"
  - rscadd: "Blockade now replenishes between Day 2 and Day 5. Up to 2 blockades can be replenished, based on pop. Blockade will never replenishes on Kingsfield (So that Kingsfield is always a one off event)"
  - bugfix: "Fixed quests being wiped out because of regeneration after the first tick in round, which labels dozens of landmarks as \"used\" even if it didn't have a quest assigned in preview state. Also staggers their regeneraiton and surface their lapsing time so that quests would lapse on a more natural cadence instead of just every 15 minutes at once."
  - rscadd: "Zadcote and HERMES is no longer interactalbe for gohsts"
  - rscadd: "Fellowship members can turn in your contracts by proxy and have it credited to THEIR ACCOUNT with THEIR TAX EXEMPTION STATUS. Steward / Clerk can also turn in contracts by proxy for convenience (or just run to the inn)"
  - balance: "Tuned down Quest & Head rewards by 25% because I believe that the contract economy is running a bit too hot for my taste and a small downtune is needed."